<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Pastel Tablecloth Preview</title>
  <style>
    :root {
      --c1: #fce7f3; /* pastel pink */
      --c2: #e0f2fe; /* pastel blue */
      --c3: #fef9c3; /* pastel yellow */
      --c4: #dcfce7; /* pastel green */
      --size: 60px;
    }

    body {
      margin: 0;
      height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      font-family: sans-serif;

      background:
        conic-gradient(
          from 90deg,
          var(--c1) 0% 25%,
          var(--c2) 25% 50%,
          var(--c3) 50% 75%,
          var(--c4) 75% 100%
        ) 0 0 / var(--size) var(--size);
    }

    .card {
      background: rgba(255,255,255,0.8);
      padding: 24px 32px;
      border-radius: 16px;
      box-shadow: 0 10px 30px rgba(0,0,0,0.1);
      backdrop-filter: blur(4px);
    }
  </style>
</head>
<body>
  <div class="card">
    <h2>Pastel Tablecloth 🎨</h2>
    <p>CSS background preview</p>
  </div>
</body>
</html>
